name: cozy-flow
display_name: Cozy Flow (AI influencer video)
family: wan
kind: video
description: >-
  Cozy Flow — an AI-influencer animation workflow built on the kijai
  WanVideoWrapper WAN Animate 2.2 ecosystem. Feed it a still image of a generated
  AI influencer plus a reference (driving) video and it animates the character
  with the pose, expression and motion of the video (ViTPose-H + YOLOv10 pose
  detection, CLIP-vision reference encode, Uni3C controlnet for animator
  stability, lightx2v step-distill LoRA for fast 4-step sampling). Runs on a
  single 4090 (24GB) for shorter clips.
vram: 24GB+
workflow: workflow.json
skill: wan-t2v-video
launch_args: []
sources:
  wanvideo_wrapper: https://github.com/kijai/ComfyUI-WanVideoWrapper
  wan_animate_preprocess: https://github.com/kijai/ComfyUI-WanAnimatePreprocess
  teskors_utils: https://github.com/teskor-hub/comfyui-teskors-utils
  diffusion_model: https://huggingface.co/Kijai/WanVideo_comfy_fp8_scaled
  weights: https://huggingface.co/Kijai/WanVideo_comfy
notes:
  - >-
    NO upstream installer existed for this pack. The model list was derived
    directly from the workflow graph and every download URL was researched and
    HEAD-verified live against the canonical Kijai / Comfy-Org / Wan-AI repos.
  - >-
    Bring your own assets. The influencer still image (LoadImage) and the
    reference / driving video (VHS_LoadVideo) are user-supplied and are NOT
    downloaded by this pack. Drop your image in ComfyUI/input/ and your video in
    ComfyUI/input/, then pick them in the two input nodes.
  - >-
    The workflow ships generic placeholder model names (WanModel.safetensors,
    vae.safetensors, text_enc.safetensors, klip_vision.safetensors,
    light.safetensors). After install, re-point each loader to the real file this
    pack downloaded (e.g. WanVideoModelLoader -> Wan2_2-Animate-14B fp8 scaled,
    CLIPLoader -> umt5-xxl-enc-bf16, CLIPVisionLoader -> clip_vision_h).
  - >-
    The WanVideoLoraSelectMulti node lists four LoRA slots; only the lightx2v
    speed LoRA (placeholder light.safetensors) is shipped here. The other three
    slots (wan.reworked, WanPusa, WanFun.reworked) are user-supplied style LoRAs
    — leave them set to none or swap in your own.
  - >-
    Requires SageAttention + Triton for the WanVideoWrapper sampler. On the
    Windows portable build install them with
    install_triton_and_sageattention_auto.bat run from
    ...\ComfyUI_windows_portable\python_embeded\. It detects your Torch/CUDA and
    installs triton-windows plus the matching woct0rdho SageAttention wheel.
  - >-
    Dtype error "self and mat2 must have the same dtype": delete and re-clone
    kijai/ComfyUI-WanVideoWrapper, then reinstall its requirements.txt with the
    portable python.
  - >-
    RTX 5000-series onnxruntime "QuickGelu" / CUDA provider error on the ViTPose
    detection — pin onnxruntime==1.20.1.
  - >-
    ViTPose-H is split into vitpose_h_wholebody_model.onnx (the graph) plus
    vitpose_h_wholebody_data.bin (the weights). Both must sit together in
    models/detection/ or the OnnxDetectionModelLoader will fail.
post_install:
  - >-
    Restart ComfyUI (or use ComfyUI-Manager -> Install missing custom nodes for
    any node Python deps).
  - >-
    Run install_triton_and_sageattention_auto.bat before first generate.
  - >-
    Load workflow.json, set your influencer image and reference video, and
    re-point the placeholder loaders to the downloaded model files.
