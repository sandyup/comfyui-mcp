# Cozy Flow (AI influencer video) install manifest — consumable by apply_manifest
#   (src/services/manifest.ts).
# NO UPSTREAM INSTALLER: this manifest was DERIVED from the workflow itself
#   (cozy-flow.json -> workflow.json). The workflow ships generic placeholder model
#   filenames (WanModel.safetensors, vae.safetensors, text_enc.safetensors,
#   klip_vision.safetensors, light.safetensors, ...); each was mapped to its real
#   canonical weight by node type and dtype, then every URL was HEAD-verified live.
# Ecosystem: kijai WanVideoWrapper WAN Animate 2.2.
#   diffusion model: https://huggingface.co/Kijai/WanVideo_comfy_fp8_scaled (Wan22Animate)
#   VAE / text encoder / Uni3C controlnet / lightx2v LoRA: https://huggingface.co/Kijai/WanVideo_comfy
#   clip_vision_h: https://huggingface.co/Comfy-Org/Wan_2.1_ComfyUI_repackaged
#   pose detection (ViTPose-H + YOLOv10m): https://huggingface.co/Kijai/vitpose_comfy
#     and https://huggingface.co/Wan-AI/Wan2.2-Animate-14B (process_checkpoint/det)

pip: []

custom_nodes:
  - https://github.com/ltdrdata/ComfyUI-Manager.git
  - https://github.com/kijai/ComfyUI-WanVideoWrapper
  - https://github.com/kijai/ComfyUI-KJNodes
  - https://github.com/kijai/ComfyUI-WanAnimatePreprocess
  - https://github.com/Kosinkadink/ComfyUI-VideoHelperSuite
  - https://github.com/teskor-hub/comfyui-teskors-utils

models:
  # --- Diffusion model (WAN Animate 2.2 14B, fp8 scaled e4m3fn, KJ v2) ---
  # workflow placeholder: WanModel.safetensors (WanVideoModelLoader). fp8 e4m3fn
  # fits a 24GB 4090 for short clips.
  - url: https://huggingface.co/Kijai/WanVideo_comfy_fp8_scaled/resolve/main/Wan22Animate/Wan2_2-Animate-14B_fp8_scaled_e4m3fn_KJ_v2.safetensors
    local_path: diffusion_models/Wan2_2-Animate-14B_fp8_scaled_e4m3fn_KJ_v2.safetensors

  # --- Text encoder (umT5-XXL) --- workflow placeholder: text_enc.safetensors (CLIPLoader, type "wan")
  - url: https://huggingface.co/Kijai/WanVideo_comfy/resolve/main/umt5-xxl-enc-bf16.safetensors
    local_path: text_encoders/umt5-xxl-enc-bf16.safetensors

  # --- VAE (Wan 2.1 VAE) --- workflow placeholder: vae.safetensors (WanVideoVAELoader)
  - url: https://huggingface.co/Kijai/WanVideo_comfy/resolve/main/Wan2_1_VAE_bf16.safetensors
    local_path: vae/Wan2_1_VAE_bf16.safetensors

  # --- CLIP vision --- workflow placeholder: klip_vision.safetensors (CLIPVisionLoader)
  - url: https://huggingface.co/Comfy-Org/Wan_2.1_ComfyUI_repackaged/resolve/main/split_files/clip_vision/clip_vision_h.safetensors
    local_path: clip_vision/clip_vision_h.safetensors

  # --- Uni3C controlnet (animator stability) --- real filename in workflow: Wan21_Uni3C_controlnet_fp16.safetensors
  - url: https://huggingface.co/Kijai/WanVideo_comfy/resolve/main/Wan21_Uni3C_controlnet_fp16.safetensors
    local_path: controlnet/Wan21_Uni3C_controlnet_fp16.safetensors

  # --- Speed LoRA (lightx2v step-distill) --- workflow placeholder: light.safetensors (WanVideoLoraSelectMulti, slot 1)
  - url: https://huggingface.co/Kijai/WanVideo_comfy/resolve/main/Lightx2v/lightx2v_I2V_14B_480p_cfg_step_distill_rank64_bf16.safetensors
    local_path: loras/lightx2v_I2V_14B_480p_cfg_step_distill_rank64_bf16.safetensors

  # --- Pose / detection (ComfyUI-WanAnimatePreprocess, OnnxDetectionModelLoader) ---
  # ViTPose-H is split: the .onnx graph references the external .bin weights — both
  # required, same folder. yolov10m.onnx is the body detector.
  - url: https://huggingface.co/Kijai/vitpose_comfy/resolve/main/onnx/vitpose_h_wholebody_model.onnx
    local_path: detection/vitpose_h_wholebody_model.onnx
  - url: https://huggingface.co/Kijai/vitpose_comfy/resolve/main/onnx/vitpose_h_wholebody_data.bin
    local_path: detection/vitpose_h_wholebody_data.bin
  - url: https://huggingface.co/Wan-AI/Wan2.2-Animate-14B/resolve/main/process_checkpoint/det/yolov10m.onnx
    local_path: detection/yolov10m.onnx
