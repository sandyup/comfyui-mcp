# Z-Image Base controlnet install manifest — consumable by apply_manifest.
# Sliced from the z-image-base monolith's "Z-IMAGE COMBO CONTROLNET" pipeline
# (Pose / Depth / Canny via comfyui_controlnet_aux preprocessors), un-bypassed
# into a standalone graph. Verified: convert-only static check passes (the
# DWPreprocessor / DepthAnythingV2Preprocessor / DetailDaemonSamplerNode nodes
# need their custom-node packs installed).
# Mirror base: https://huggingface.co/Aitrepreneur/FLX/resolve/main  (third-party)

# comfyui-vrgamedevgirl's nodes.py (FastFilmGrain / FastLaplacianSharpen) imports
# librosa at module load; pin it so the post-proc nodes register.
pip:
  - librosa
  - scikit-image   # DWPreprocessor (DWPose) needs skimage or it silently fails to register

custom_nodes:
  - https://github.com/ltdrdata/ComfyUI-Manager.git
  - https://github.com/city96/ComfyUI-GGUF
  - https://github.com/rgthree/rgthree-comfy
  - https://github.com/yolain/ComfyUI-Easy-Use
  - https://github.com/kijai/ComfyUI-KJNodes
  - https://github.com/ssitu/ComfyUI_UltimateSDUpscale
  - https://github.com/cubiq/ComfyUI_essentials
  - https://github.com/wallish77/wlsh_nodes
  - https://github.com/vrgamegirl19/comfyui-vrgamedevgirl
  - https://github.com/ClownsharkBatwing/RES4LYF
  - https://github.com/Jonseed/ComfyUI-Detail-Daemon
  - https://github.com/Fannovel16/comfyui_controlnet_aux

models:
  # UNet (GGUF) — Z-Image BASE DiT (node UnetLoaderGGUF -> z_image-Q8_0.gguf)
  - url: https://huggingface.co/Aitrepreneur/FLX/resolve/main/z_image-Q8_0.gguf
    local_path: unet/z_image-Q8_0.gguf
  # UNet (GGUF) — Z-Image TURBO DiT (controlnet combo chains base + turbo)
  - url: https://huggingface.co/Aitrepreneur/FLX/resolve/main/z_image_turbo-Q8_0.gguf
    local_path: unet/z_image_turbo-Q8_0.gguf
  # Text encoder — Qwen3-4B (CLIPLoaderGGUF, CLIP type qwen_image)
  - url: https://huggingface.co/Aitrepreneur/FLX/resolve/main/Qwen3-4B-UD-Q6_K_XL.gguf
    local_path: text_encoders/Qwen3-4B-UD-Q6_K_XL.gguf
  # VAE — z-image VAE (saved as z-image-ae.safetensors to avoid the Flux ae clash)
  - url: https://huggingface.co/Aitrepreneur/FLX/resolve/main/ae.safetensors
    local_path: vae/z-image-ae.safetensors
  # ControlNet — Z-Image-Fun Union (ModelPatchLoader)
  - url: https://huggingface.co/Aitrepreneur/FLX/resolve/main/Z-Image-Fun-Controlnet-Union-2.1.safetensors
    local_path: model_patches/Z-Image-Fun-Controlnet-Union-2.1.safetensors
  # LoRA — 8-step distill (Power Lora Loader)
  - url: https://huggingface.co/Aitrepreneur/FLX/resolve/main/Z-Image-Fun-Lora-Distill-8-Steps_ComfyUI.safetensors
    local_path: loras/Z-Image-Fun-Lora-Distill-8-Steps_ComfyUI.safetensors

  # NOTE: ControlNet preprocessor weights referenced by the workflow
  # (depth_anything_v2_vitl.pth, dw-ll_ucoco_384_bs5.torchscript.pt, yolox_l.onnx)
  # are NOT bundled — comfyui_controlnet_aux auto-downloads them on first use.
