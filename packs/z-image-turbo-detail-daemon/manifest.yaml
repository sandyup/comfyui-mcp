# Z-Image-Turbo Detail Daemon install manifest — consumable by apply_manifest.
# Sliced from the z-image-turbo monolith's "Z-IMAGE TURBO DETAIL DEAMON" pipeline
# (un-bypassed standalone). DetailDaemonSamplerNode comes from ComfyUI-Detail-Daemon.
# Mirror base: https://huggingface.co/Aitrepreneur/FLX/resolve/main  (third-party)

# comfyui-vrgamedevgirl's nodes.py (FastFilmGrain / FastLaplacianSharpen) imports
# librosa at module load; pin it so the post-proc nodes register.
