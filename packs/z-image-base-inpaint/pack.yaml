name: z-image-base-inpaint
display_name: Z-Image Base — Inpainting
family: z-image
kind: inpaint
description: >-
  Z-Image Base (Alibaba Tongyi, 6B S3-DiT base model) inpainting: mask a region of
  an input image and regenerate only the masked area from a text prompt. Uses a Qwen
  text encoder (not CLIP/T5), GGUF-quantized to run in <8GB VRAM, paired with an
  8-step distill LoRA. Single-purpose inpaint graph sliced from the z-image-base
  monolith (one pipeline, no group toggles).
vram: "<8GB"
workflow: workflow.json
skill: z-image-txt2img
launch_args: []
sources:
  model: https://huggingface.co/Aitrepreneur/FLX
  mirror: https://huggingface.co/Aitrepreneur/FLX
notes:
  - Run the generated installer from your ComfyUI root (folder with custom_nodes/
    and models/).
  - Sliced + un-bypassed from the monolith's "Z-IMAGE INPAINTING".
  - Load an input image and paint a mask (right-click -> Open in MaskEditor) before
    generating.
  - The z-image VAE is saved as z-image-ae.safetensors (its weights differ from
    Flux's ae.safetensors despite the same size).
post_install:
  - Restart ComfyUI (or ComfyUI-Manager -> Install missing custom nodes for any
    node Python deps).
  - Load workflow.json.
