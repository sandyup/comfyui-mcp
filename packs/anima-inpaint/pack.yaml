name: anima-inpaint
display_name: ANIMA 1.0 — Inpainting (ControlNet)
family: anima
kind: inpaint
description: >-
  ANIMA 1.0 (circlestone-labs, ~2B DiT anime/illustration base on NVIDIA
  Cosmos-Predict2-2B) masked inpainting with the Anima-LLLite inpainting
  ControlNet — repaint a masked region while keeping the rest of the image.
  Single pipeline sliced from the ANIMA monolith (no group toggles), with the
  Turbo LoRA preset and a latent upscaler built in.
vram: "<6GB"
workflow: workflow.json
skill: anima-base
launch_args: []
sources:
  patreon: https://www.patreon.com/posts/157355820
  model: https://huggingface.co/circlestone-labs/Anima
  mirror: https://huggingface.co/Aitrepreneur/FLX
notes:
  - Run the generated installer from your ComfyUI root (folder with custom_nodes/
    and models/).
  - Sliced + un-bypassed from the monolith's "INPAINTING CONTROLNET".
  - Uses the kohya-ss ComfyUI-Anima-LLLite node (AnimaLLLiteApply) with the
    anima-lllite-inpainting-v1 ControlNet.
  - Turbo LoRA preset is the shipped default — 12 steps, CFG 1.0, er_sde/simple.
post_install:
  - Restart ComfyUI (or ComfyUI-Manager -> Install missing custom nodes for any
    node Python deps).
  - Load workflow.json.
