name: z-image-turbo-combo
display_name: Z-Image-Turbo — Two-Times Combo (txt2img + refine)
family: z-image
kind: combo
description: >-
  Z-Image-Turbo (Alibaba Tongyi, distilled S3-DiT) "two-times combo" — a first
  txt2img pass feeds a second sampler pass that resizes and refines the result for
  extra sharpness/detail, in ~8-14 steps at cfg 1. Uses a Qwen text encoder (not
  CLIP/T5). Single-purpose combo graph sliced from the z-image-turbo monolith (one
  pipeline, no group toggles), with optional film-grain / laplacian-sharpen
  post-processing and seed-variance.
vram: "<8GB"
workflow: workflow.json
skill: z-image-txt2img
launch_args: []
sources:
  model: https://huggingface.co/Comfy-Org/z_image_turbo
  mirror: https://huggingface.co/Aitrepreneur/FLX
notes:
  - Run the generated installer from your ComfyUI root (folder with custom_nodes/
    and models/).
  - Sliced + un-bypassed from the monolith's "Z-IMAGE TURBO TWO TIMES COMBO TEXT
    TO IMAGE".
  - Two sampler passes — the second refines/resizes the first; both seeds are
    exposed.
  - The z-image VAE is saved as z-image-ae.safetensors (its weights differ from
    Flux's ae.safetensors despite the same size).
post_install:
  - Restart ComfyUI (or ComfyUI-Manager -> Install missing custom nodes for any
    node Python deps).
  - Load workflow.json.
