name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Gate the publish on a real install of the packed tarball: catches a
      # broken postinstall / missing-file packaging regression (e.g. 0.17.0,
      # where the files allowlist dropped scripts/ but postinstall still ran
      # node scripts/postinstall.mjs) BEFORE it reaches npm.
      - name: Pack & install smoke
        run: node scripts/smoke-install.mjs

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
