name: Build RunPod image

# Builds docker/runpod's image on GitHub-hosted runners with a BuildKit registry
# cache, so unchanged layers (the pinned torch, ComfyUI, the base OS) are reused
# across runs instead of a full from-scratch build every time — this is what
# removes the "needs a local Docker daemon on a manual build machine" step.
#
# LEAN BY DEFAULT: GitHub-hosted runners don't have enough free disk for the
# optional ~63 GB aitrepreneur donor pull (INCLUDE_RUNPOD_EXTRAS) or the ~6.9 GB
# spotcheck model bake (BAKE_SPOTCHECK_MODEL) — both are skipped here (see
# docker/runpod/README.md's "63 GB donor pull" section for what that omits: only
# the best-effort runpod-uploader/croc/app-manager extras and the baked SDXL
# spotcheck checkpoint; ComfyUI/Manager/the Agent Panel are unaffected). This
# validates the Dockerfile builds cleanly and warms the shared-layer cache for
# everyone; a full donor-inclusive build still needs a larger host/runner.

on:
  push:
    branches: [main]
    paths:
      - "docker/runpod/**"
      - ".github/workflows/build-runpod-image.yml"
  workflow_dispatch:
    inputs:
      include_runpod_extras:
        description: "Bake the aitrepreneur donor extras (~63 GB pull — needs a larger runner)"
        type: boolean
        default: false
      bake_spotcheck_model:
        description: "Bake the SDXL spotcheck checkpoint (~6.9 GB)"
        type: boolean
        default: false

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Standard GitHub-hosted runners ship ~20-25 GB free under /, which is
      # tight even for the lean build (base image + the pinned torch + ComfyUI).
      # Drop preinstalled toolchains this build doesn't use to buy headroom.
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            /usr/local/lib/android "$AGENT_TOOLSDIRECTORY" /opt/hostedtoolcache \
            2>/dev/null || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (lean — no donor extras / no spotcheck model)
        uses: docker/build-push-action@v6
        with:
          context: docker/runpod
          push: true
          tags: ghcr.io/artokun/comfyui-mcp-runpod:cu128-lean
          build-args: |
            INCLUDE_RUNPOD_EXTRAS=${{ github.event.inputs.include_runpod_extras == 'true' && '1' || '0' }}
            BAKE_SPOTCHECK_MODEL=${{ github.event.inputs.bake_spotcheck_model == 'true' && '1' || '0' }}
          cache-from: type=registry,ref=ghcr.io/artokun/comfyui-mcp-runpod:buildcache
          cache-to: type=registry,ref=ghcr.io/artokun/comfyui-mcp-runpod:buildcache,mode=max

      # Post-push integrity check of what the registry ACTUALLY serves (manifest
      # + the custom_nodes_seed layer only — a few MB, not the whole image). The
      # Dockerfile's build-time gate catches a broken build; this catches a build
      # that went stale/mangled through the registry cache or the push itself.
      # A red run here means: do NOT retag this build for Docker Hub / the
      # RunPod template.
      - name: Verify pushed image (registry-side integrity)
        run: python3 docker/runpod/verify_image_remote.py ghcr.io/artokun/comfyui-mcp-runpod:cu128-lean
